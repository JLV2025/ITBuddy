# Compose file for production.
#
# Usage:
#   docker compose up -d
#
# This builds the app image locally from the Dockerfile.
# After first run, visit http://localhost:8000/setup to complete installation.

volumes:
  db_data:
  storage:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: itbuddy/itbuddy:${APP_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - storage:/var/lib/itbuddy
      - ./.env:/var/www/html/.env
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env

  db:
    image: mariadb:11.4.7
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      # https://mariadb.com/kb/en/using-healthcheck-sh/#compose-file-example
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 1s
      retries: 5
